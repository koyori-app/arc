name: Release

# 初版は手動 publish 後、npmjs.com でこのリポジトリ + workflow を
# Trusted Publisher として登録すること。以降は GitHub Release 公開で自動 publish。
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@205232b9cc28eb4b4b460460835d993f6fc018e1 # wasm-pack

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # pnpm 9 delegates publish to the system npm, and trusted publishing (OIDC)
      # requires npm >= 11.5.1 (the npm bundled with Actions' Node is 10.x and
      # fails with a misleading E404). Upgrade npm before publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Build npm package
        run: bash scripts/build-npm.sh

      # No NODE_AUTH_TOKEN needed — OIDC id-token is exchanged automatically.
      - name: Publish to npm
        working-directory: crates/koyori-arc-core/pkg
        run: npm publish --provenance --access public

      # crates.io Trusted Publisher (OIDC) — no stored token needed.
      # Register this repo + workflow on crates.io before the first publish.
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p koyori-arc-core
