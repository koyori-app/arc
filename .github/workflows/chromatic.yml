name: Chromatic

on:
  push:
    branches: [master]
  pull_request:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@205232b9cc28eb4b4b460460835d993f6fc018e1 # wasm-pack

      - name: Build npm package (pkg/ を生成)
        run: bash scripts/build-npm.sh

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook --stats-json
        working-directory: packages/arc-vue

      - name: Publish to Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/arc-vue
          storybookBuildDir: storybook-static
          onlyChanged: true
          exitZeroOnChanges: true
          autoAcceptChanges: master
          skip: ${{ github.event.pull_request.draft == true }}
