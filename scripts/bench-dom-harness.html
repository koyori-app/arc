<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>koyori-arc DOM bench harness</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #host { min-height: 100vh; }
    #host canvas { display: block; }
  </style>
</head>
<body>
  <div id="host"></div>
  <script type="module">
    import init, { render_svg, render_canvas_commands } from '../../crates/koyori-arc-core/pkg/koyori_arc_core.js';
    import { replayCommands, parseCommandBuffer } from './bench-canvas-replay.js';

    const params = new URLSearchParams(location.search);
    const fixtureName = params.get('fixture') ?? '100_sparse';
    const backend = params.get('backend') ?? 'svg';
    const virtualize = params.get('virtualize') !== '0';
    const scrollY = Number(params.get('scroll_y') ?? '0');
    const clientHeight = Number(params.get('client_height') ?? '600');

    await init();

    const viewportJson = virtualize
      ? JSON.stringify({ scroll_y: scrollY, client_height: clientHeight })
      : undefined;

    window.__benchReady = true;
    window.__runBench = async function runBench() {
      const res = await fetch(`../crates/koyori-arc-core/benches/fixtures/${fixtureName}.json`);
      const fx = await res.json();
      const tasksJson = JSON.stringify(fx.tasks);
      const depsJson = JSON.stringify(fx.deps);
      const host = document.getElementById('host');

      if (backend === 'canvas') {
        const t0 = performance.now();
        const bufJson = render_canvas_commands(tasksJson, depsJson, fx.today, viewportJson);
        const wasmMs = performance.now() - t0;
        const buffer = parseCommandBuffer(bufJson);
        const byteLength = new TextEncoder().encode(bufJson).length;
        const canvasOps = buffer.ops?.length ?? 0;

        host.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.width = buffer.viewport_width;
        canvas.height = buffer.viewport_height;
        host.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        const domStart = performance.now();
        replayCommands(ctx, buffer);
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const domMs = performance.now() - domStart;

        return {
          wasmMs,
          domMs,
          byteLength,
          elementCount: 0,
          liveElems: 0,
          canvasOps,
          virtualize,
          backend: 'canvas',
          taskCount: fx.tasks.length,
          depCount: fx.deps.length,
        };
      }

      const t0 = performance.now();
      const svg = render_svg(tasksJson, depsJson, fx.today, viewportJson);
      const wasmMs = performance.now() - t0;

      const byteLength = new TextEncoder().encode(svg).length;
      const elementCount = (svg.match(/<[^/!][^>]*>/g) ?? []).length;

      host.innerHTML = '';

      const domStart = performance.now();
      host.innerHTML = svg;
      const liveElems = host.querySelectorAll('*').length;
      await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      const domMs = performance.now() - domStart;

      return {
        wasmMs,
        domMs,
        byteLength,
        elementCount,
        liveElems,
        virtualize,
        backend: 'svg',
        taskCount: fx.tasks.length,
        depCount: fx.deps.length,
      };
    };
  </script>
</body>
</html>
